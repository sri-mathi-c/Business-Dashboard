<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Settings | InsightIQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="container mt-5">

    <h2>Settings</h2>
    <p>Manage your account and system preferences</p>

    <div class="card p-4 shadow-sm">

        <div class="mb-3">
            <label>Company Name</label>
            <input type="text" class="form-control" placeholder="InsightIQ Pvt Ltd">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" placeholder="admin@insightiq.com">
        </div>

        <div class="mb-3">
            <label>Change Password</label>
            <input type="password" class="form-control" placeholder="New Password">
        </div>

        <button class="btn btn-primary w-100">
            Save Changes
        </button>

    </div>

    <a href="dashboard.html" class="btn btn-secondary mt-4">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
