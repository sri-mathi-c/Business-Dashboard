<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | InsightIQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="container mt-5">

    <h2>Business Reports</h2>
    <p>Monthly business performance summary.</p>

    <div class="card p-4 shadow-sm">

        <table class="table table-bordered table-hover">

            <thead class="table-primary">
                <tr>
                    <th>Month</th>
                    <th>Revenue</th>
                    <th>Orders</th>
                    <th>Customers</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>January</td>
                    <td>₹8,50,000</td>
                    <td>980</td>
                    <td>6400</td>
                </tr>

                <tr>
                    <td>February</td>
                    <td>₹9,20,000</td>
                    <td>1045</td>
                    <td>6900</td>
                </tr>

                <tr>
                    <td>March</td>
                    <td>₹10,75,000</td>
                    <td>1180</td>
                    <td>7600</td>
                </tr>
            </tbody>

        </table>

        <button class="btn btn-success mt-3">
            Download Report
        </button>

    </div>

    <a href="dashboard.html" class="btn btn-primary mt-4">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
