<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #00c6ff;
        }

        .forgot {
            margin-top: 10px;
            font-size: 14px;
        }

        .forgot a {
            text-decoration: none;
            color: #4facfe;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="forgot">
        <a href="#" onclick="alert('Reset link coming soon')">Forgot Password?</a>
    </p>

</div>

<script src="login.js"></script>

</body>
</html>
